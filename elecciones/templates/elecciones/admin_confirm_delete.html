{% extends 'elecciones/base.html' %}

{% block content %}
<section class="card section-card admin-panel">
    <h1>Eliminar {{ type|capfirst }}</h1>
    <p>¿Estás seguro de que deseas eliminar este {{ type }}?</p>

    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="button button-delete">Sí, eliminar</button>
            <a href="{{ cancel_url }}" class="button cancel-button">Cancelar</a>
            <a href="{% url 'admin_dashboard' %}" class="button small">Volver al panel</a>
        </div>
    </form>
</section>
{% endblock %}
